<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow a Garden 2 Dashboard</title>
  <style>
    :root {
      --bg: #f8f6ef;
      --card: #fffaf0;
      --ink: #1f2a1d;
      --muted: #4f5d4c;
      --accent: #3f8f3e;
      --accent2: #f2a93b;
      --line: #d7d2c3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, #fff2cc 0%, transparent 35%),
        radial-gradient(circle at 90% 0%, #d7f5cf 0%, transparent 30%),
        var(--bg);
    }
    .wrap {
      width: min(1200px, 94vw);
      margin: 24px auto 60px;
    }
    .hero {
      background: linear-gradient(135deg, #2f6d2f, #4ea64d);
      color: #fefdf8;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(33, 66, 24, 0.25);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      letter-spacing: 0.4px;
    }
    .hero p {
      margin: 10px 0 0;
      opacity: 0.95;
    }
    .grid {
      display: grid;
      gap: 16px;
      margin-top: 16px;
      grid-template-columns: 1.1fr 1fr;
    }
    @media (max-width: 940px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 16px rgba(36, 41, 31, 0.08);
    }
    .card h2 {
      margin: 0;
      font-size: 1.2rem;
      color: #254a20;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .pill {
      display: inline-block;
      font-size: 0.8rem;
      margin-top: 8px;
      background: #e9f6e7;
      color: #2f6b2e;
      border: 1px solid #b9ddb6;
      border-radius: 999px;
      padding: 5px 10px;
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #2f6d2f;
      background: #3f8f3e;
      color: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { filter: brightness(1.06); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 0.92rem;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
    }
    th {
      color: #355f31;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .seed-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 8px;
    }
    .seed-list li {
      border: 1px solid #d7d2c3;
      border-radius: 10px;
      padding: 10px;
      background: #fffef9;
    }
    .seed-name { font-weight: 700; }
    .seed-qty { color: #5a6a56; font-size: 0.9rem; margin-top: 4px; }
    .status {
      margin-top: 12px;
      color: #6b6658;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Grow a Garden 2 Live Tracker</h1>
      <p>Top 1000 Guilds + Live Seed Shop in one place.</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Top 1000 Guilds</h2>
        <div class="meta" id="guildMeta">Loading...</div>
        <span class="pill" id="guildCount">0 guilds</span>
        <div class="controls">
          <button id="refreshGuilds">Refresh Guilds</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Guild</th>
              <th>Members</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="guildBody"></tbody>
        </table>
      </article>

      <article class="card">
        <h2>Live Seed Shop</h2>
        <div class="meta" id="seedMeta">Loading...</div>
        <span class="pill" id="seedCount">0 seeds</span>
        <div class="controls">
          <button id="refreshSeeds">Refresh Seed Shop</button>
        </div>
        <ul id="seedList" class="seed-list"></ul>
      </article>
    </section>

    <div class="status" id="statusLine">Ready.</div>
  </div>

  <script>
    const guildBody = document.getElementById('guildBody');
    const guildMeta = document.getElementById('guildMeta');
    const guildCount = document.getElementById('guildCount');

    const seedList = document.getElementById('seedList');
    const seedMeta = document.getElementById('seedMeta');
    const seedCount = document.getElementById('seedCount');

    const statusLine = document.getElementById('statusLine');

    function setStatus(text) {
      statusLine.textContent = text;
    }

    async function loadGuilds() {
      setStatus('Loading top guilds...');
      const res = await fetch('/api/top-guilds', { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load top guilds');
      const data = await res.json();
      const rows = Array.isArray(data.guilds) ? data.guilds : [];

      guildBody.innerHTML = '';
      for (const row of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.rank ?? ''}</td>
          <td>${row.name ?? 'Unknown'}</td>
          <td>${row.members ?? '-'}</td>
          <td>${row.score ?? '-'}</td>
        `;
        guildBody.appendChild(tr);
      }

      guildCount.textContent = `${rows.length} guilds`;
      guildMeta.textContent = `Source: ${data.source || 'unknown'} | Updated: ${new Date().toLocaleTimeString()}`;
      setStatus('Top guilds updated.');
    }

    async function loadSeedShop() {
      setStatus('Loading live seed shop...');
      const res = await fetch('/api/live-seed-shop', { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load seed shop');
      const data = await res.json();
      const items = Array.isArray(data.seeds) ? data.seeds : [];

      seedList.innerHTML = '';
      for (const item of items) {
        const li = document.createElement('li');
        li.innerHTML = `
          <div class="seed-name">${item.name ?? 'Unknown'}</div>
          <div class="seed-qty">Quantity: ${item.quantity ?? 0}</div>
        `;
        seedList.appendChild(li);
      }

      seedCount.textContent = `${items.length} in stock`;
      const next = data.nextRestock ? ` | Next restock: ${data.nextRestock}` : '';
      seedMeta.textContent = `Source: ${data.source || 'unknown'}${next}`;
      setStatus('Seed shop updated.');
    }

    async function loadAll() {
      try {
        await Promise.all([loadGuilds(), loadSeedShop()]);
      } catch (err) {
        setStatus(`Error: ${err.message}`);
      }
    }

    document.getElementById('refreshGuilds').addEventListener('click', () => loadGuilds().catch(err => setStatus(`Error: ${err.message}`)));
    document.getElementById('refreshSeeds').addEventListener('click', () => loadSeedShop().catch(err => setStatus(`Error: ${err.message}`)));

    loadAll();
    setInterval(() => loadAll(), 30000);
  </script>
</body>
</html>
